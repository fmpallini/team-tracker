name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and publish draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Assemble release assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp dist/app.html "staging/team-tracker-${VERSION}.html"
          (cd dist/pwa && zip -r "../../staging/team-tracker-pwa-${VERSION}.zip" .)
          (cd staging && sha256sum * > checksums.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: |
            staging/team-tracker-${{ steps.assets.outputs.version }}.html
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip
            dist/pwa/**

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            staging/team-tracker-${{ steps.assets.outputs.version }}.html \
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip \
            staging/checksums.txt \
            --draft \
            --generate-notes \
            --title "${{ github.ref_name }}"

      # deploy-pages deploys this exact build (not a rebuild) so the live
      # Pages site is provably the same bytes just attested above, not a
      # separately-built copy that merely shares the same source.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pwa-build
          path: dist/pwa

  # Publishes the same attested PWA build to GitHub Pages on every tagged
  # release — separate job so its own `pages`/`id-token` permissions and
  # `github-pages` environment stay scoped away from the release-asset job
  # above. Deploys the artifact build-and-release already built and attested,
  # rather than rebuilding, so there's an unbroken chain from "attested" to
  # "what's actually served."
  deploy-pages:
    name: Deploy PWA to GitHub Pages
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pwa-build
          path: dist/pwa
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/pwa
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
