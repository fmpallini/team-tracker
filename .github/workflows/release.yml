name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and publish draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Assemble release assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp dist/app.html "staging/team-tracker-${VERSION}.html"
          (cd dist/pwa && zip -r "../../staging/team-tracker-pwa-${VERSION}.zip" .)
          (cd staging && sha256sum * > checksums.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            staging/team-tracker-${{ steps.assets.outputs.version }}.html
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip
            dist/pwa/**

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            staging/team-tracker-${{ steps.assets.outputs.version }}.html \
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip \
            staging/checksums.txt \
            --draft \
            --generate-notes \
            --title "${{ github.ref_name }}"

      # deploy-pages deploys this exact build (not a rebuild) so the live
      # Pages site is provably the same bytes just attested above, not a
      # separately-built copy that merely shares the same source.
      - uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: dist/pwa

  # Publishes the same attested PWA build to GitHub Pages on every tagged
  # release — separate job so its own `pages`/`id-token` permissions and
  # `github-pages` environment stay scoped away from the release-asset job
  # above. Deploys the artifact build-and-release already built and attested,
  # rather than rebuilding, so there's an unbroken chain from "attested" to
  # "what's actually served."
  deploy-pages:
    name: Deploy PWA to GitHub Pages
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pwa-build
          path: dist/pwa
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pwa
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
