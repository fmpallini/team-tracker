name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Assemble release assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp dist/app.html "staging/team-tracker-${VERSION}.html"
          (cd dist/pwa && zip -r "../../staging/team-tracker-pwa-${VERSION}.zip" .)
          (cd staging && sha256sum * > checksums.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            staging/team-tracker-${{ steps.assets.outputs.version }}.html
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip
            dist/pwa/**

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            staging/team-tracker-${{ steps.assets.outputs.version }}.html \
            staging/team-tracker-pwa-${{ steps.assets.outputs.version }}.zip \
            staging/checksums.txt \
            --generate-notes \
            --title "${{ github.ref_name }}"

      # deploy-pages deploys this exact build (not a rebuild) so the live
      # Pages site is provably the same bytes just attested above, not a
      # separately-built copy that merely shares the same source.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pwa-build
          path: dist/pwa

  # dev -> main PRs always merge with a merge commit (never squash — see
  # CLAUDE.md), so main's tip is always dev's own tip plus that merge commit:
  # a pure fast-forward, never a real divergence. Nothing moves dev's ref
  # forward past those merge commits on its own though, so GitHub keeps
  # showing dev as "N commits behind" and it grows by one merge each release.
  # This job closes that gap right after every tagged release. It only ever
  # fast-forwards (never force-pushes/rewrites): if dev and the tag have
  # truly diverged — e.g. a squash-merged PR broke the ancestor invariant —
  # it warns and leaves both branches untouched for manual resolution.
  sync-dev:
    name: Fast-forward dev to match this release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Fast-forward dev if it's a clean ancestor of this tag
        run: |
          set -euo pipefail
          git fetch origin dev
          dev_sha="$(git rev-parse origin/dev)"
          tag_sha="$(git rev-parse "${{ github.ref_name }}^{commit}")"

          if [ "$dev_sha" = "$tag_sha" ]; then
            echo "dev already matches ${tag_sha}."
          elif git merge-base --is-ancestor "$tag_sha" "$dev_sha"; then
            echo "dev already contains ${tag_sha} (dev is ahead) — nothing to do."
          elif git merge-base --is-ancestor "$dev_sha" "$tag_sha"; then
            git push origin "${tag_sha}:refs/heads/dev"
            echo "Fast-forwarded dev from ${dev_sha} to ${tag_sha}."
          else
            echo "::warning::dev (${dev_sha}) and ${{ github.ref_name }} (${tag_sha}) have diverged — not a clean fast-forward, skipping. Check for a squash-merged PR (see CLAUDE.md) and resolve manually."
          fi

  # Publishes the same attested PWA build to GitHub Pages on every tagged
  # release — separate job so its own `pages`/`id-token` permissions and
  # `github-pages` environment stay scoped away from the release-asset job
  # above. Deploys the artifact build-and-release already built and attested,
  # rather than rebuilding, so there's an unbroken chain from "attested" to
  # "what's actually served."
  deploy-pages:
    name: Deploy PWA to GitHub Pages
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pwa-build
          path: dist/pwa
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/pwa
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
