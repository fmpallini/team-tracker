name: CI

on:
  push:
    branches:
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - dev
      - main

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # Only runs for PRs targeting main — dev -> main is where releases are cut,
  # so this is the heavier gate: full build, on both OSes, with output
  # sanity checks. Feature -> dev and plain dev pushes only need `check`.
  release-gate:
    name: Release gate (build)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: check
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist outputs
        shell: bash
        run: |
          test -f dist/app.html
          test -f dist/pwa/index.html
          test -f dist/pwa/sw.js
          test -f dist/pwa/manifest.json
